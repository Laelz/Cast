services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: slim_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    tty: true
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: slim_postgres
    restart: always
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: